<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>izaw.pl</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="./assets/img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: radial-gradient(
          circle at 20% 20%,
          #64133b,
          #0e090d 50%,
          #0e090d 100%
        );
        font-family: "Roboto", sans-serif;
      }
      .joke-widget {
        width: min(720px, calc(100% - 2rem));
        padding: 1.5rem;
        text-align: center;
      }
      .joke-widget__text {
        margin: 0;
        color: #ffffff;
        line-height: 1.65;
        font-size: clamp(1rem, 2.2vw, 1.35rem);
      }
      .joke-widget__actions {
        margin-top: 1.25rem;
      }
      .joke-widget__button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #ffffff;
        color: #2a0a4a;
        padding: 0.7rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          background-color 0.15s ease;
      }
      .joke-widget__button:hover {
        background: #ece5ff;
        transform: translateY(-1px);
      }
      .joke-widget__button:active {
        transform: translateY(0);
      }
      .joke-widget__button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }
    </style>

  </head>
  <body>

  </body>
</html>
