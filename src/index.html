<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>izaw.pl</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="./assets/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: transparent;
      }
      body > img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
      }
    </style>

    <!-- Matomo -->
    <script>
      var _paq = (window._paq = window._paq || []);
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(["trackPageView"]);
      _paq.push(["enableLinkTracking"]);
      (function () {
        var u = "https://izaw.matomo.cloud/";
        _paq.push(["setTrackerUrl", u + "matomo.php"]);
        _paq.push(["setSiteId", "1"]);
        var d = document,
          g = d.createElement("script"),
          s = d.getElementsByTagName("script")[0];
        g.async = true;
        g.src = "https://cdn.matomo.cloud/izaw.matomo.cloud/matomo.js";
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    <!-- End Matomo Code -->
    <script>
      (function () {
        window.emitMatomoAction = function (actionName, label) {
          window._paq = window._paq || [];
          try {
            window._paq.push(["trackEvent", actionName, "emit", label || ""]);
          } catch (e) {
            /* silent */
          }
        };

        window.ACTION_ENTER = function (label) {
          window.emitMatomoAction(
            "ACTION_ENTER",
            label || location.pathname || document.title,
          );
        };

        window.ACTION_CLICK = function (label) {
          window.emitMatomoAction("ACTION_CLICK", label || "");
        };

        // Emit ACTION_ENTER once when the app is ready
        if (
          document.readyState === "complete" ||
          document.readyState === "interactive"
        ) {
          window.ACTION_ENTER();
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            window.ACTION_ENTER();
          });
        }
      })();
    </script>
  </head>

      alt="logo"
    />
