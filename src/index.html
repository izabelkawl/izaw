<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>izaw.pl</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="./assets/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: transparent;
      }
      body > img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
      }
    </style>

    <!-- Matomo -->
    <script>
      var _paq = (window._paq = window._paq || []);
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(["trackPageView"]);
      _paq.push(["enableLinkTracking"]);
      (function () {
        var u = "https://izaw.matomo.cloud/";
        _paq.push(["setTrackerUrl", u + "matomo.php"]);
        _paq.push(["setSiteId", "1"]);
        var d = document,
          g = d.createElement("script"),
          s = d.getElementsByTagName("script")[0];
        g.async = true;
        g.src = "https://cdn.matomo.cloud/izaw.matomo.cloud/matomo.js";
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    <!-- End Matomo Code -->
    <script>
      (function () {
        // Wait for Matomo to be fully loaded before tracking events
        var trackingReady = false;
        var trackingQueue = [];

        function sendQueuedEvents() {
          if (trackingReady && window._paq) {
            while (trackingQueue.length > 0) {
              var event = trackingQueue.shift();
              window._paq.push(event);
            }
          }
        }

        // Check if Matomo is loaded
        function checkMatomoReady() {
          if (
            window._paq &&
            (window.Matomo ||
              (window._paq.length && typeof window._paq.push === "function"))
          ) {
            trackingReady = true;
            sendQueuedEvents();
          } else {
            setTimeout(checkMatomoReady, 100);
          }
        }

        checkMatomoReady();

        // Emit generic action to Matomo
        window.emitMatomoAction = function (action, name, label) {
          var event = ["trackEvent", "Zdarzenia", action, name, label || 1];
          if (trackingReady && window._paq) {
            window._paq.push(event);
          } else {
            trackingQueue.push(event);
          }
        };

        window.ACTION_ENTER = function (label) {
          window.emitMatomoAction(
            "ACTION_ENTER",
            label || location.pathname || document.title,
            1,
          );
        };

        window.ACTION_CLICK = function (label) {
          window.emitMatomoAction("ACTION_CLICK", label || "", 1);
        };

        window.ACTION_FOCUS = function (label) {
          window.emitMatomoAction("ACTION_FOCUS", label || "", 1);
        };

        // Emit ACTION_ENTER once when the app is ready
        if (
          document.readyState === "complete" ||
          document.readyState === "interactive"
        ) {
          setTimeout(function () {
            window.ACTION_ENTER();
          }, 500);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(function () {
              window.ACTION_ENTER();
            }, 500);
          });
        }

        // Add click listener to img for ACTION_CLICK
        function attachImgClickListener() {
          var img = document.querySelector("body > img");
          if (img) {
            img.addEventListener("click", function () {
              window.ACTION_CLICK("img-click");
            });
            img.addEventListener("focus", function () {
              window.ACTION_FOCUS("img-focus");
            });
            img.style.cursor = "pointer";
            img.setAttribute("tabindex", "0");
          }
        }

        if (
          document.readyState === "complete" ||
          document.readyState === "interactive"
        ) {
          attachImgClickListener();
        } else {
          document.addEventListener("DOMContentLoaded", attachImgClickListener);
        }
      })();
    </script>
  </head>
