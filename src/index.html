<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>izaw.pl</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="./assets/img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: radial-gradient(
          circle at 20% 20%,
          #64133b,
          #0e090d 50%,
          #0e090d 100%
        );
        font-family: "Roboto", sans-serif;
      }
      .joke-widget {
        width: min(720px, calc(100% - 2rem));
        padding: 1.5rem;
        text-align: center;
      }
      .joke-widget__text {
        margin: 0;
        color: #ffffff;
        line-height: 1.65;
        font-size: clamp(1rem, 2.2vw, 1.35rem);
      }
      .joke-widget__actions {
        margin-top: 1.25rem;
      }
      .joke-widget__button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #ffffff;
        color: #2a0a4a;
        padding: 0.7rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          background-color 0.15s ease;
      }
      .joke-widget__button:hover {
        background: #ece5ff;
        transform: translateY(-1px);
      }
      .joke-widget__button:active {
        transform: translateY(0);
      }
      .joke-widget__button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }
    </style>

    <!-- Matomo -->
    <script>
      var _paq = (window._paq = window._paq || []);
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(["trackPageView"]);
      _paq.push(["enableLinkTracking"]);
      (function () {
        var u = "https://izaw.matomo.cloud/";
        _paq.push(["setTrackerUrl", u + "matomo.php"]);
        _paq.push(["setSiteId", "1"]);
        var d = document,
          g = d.createElement("script"),
          s = d.getElementsByTagName("script")[0];
        g.async = true;
        g.src = "https://cdn.matomo.cloud/izaw.matomo.cloud/matomo.js";
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    <!-- End Matomo Code -->
    <script>
      (function () {
        // Wait for Matomo to be fully loaded before tracking events
        var trackingReady = false;
        var trackingQueue = [];

        function sendQueuedEvents() {
          if (trackingReady && window._paq) {
            while (trackingQueue.length > 0) {
              var event = trackingQueue.shift();
              window._paq.push(event);
            }
          }
        }

        // Check if Matomo is loaded
        function checkMatomoReady() {
          if (
            window._paq &&
            (window.Matomo ||
              (window._paq.length && typeof window._paq.push === "function"))
          ) {
            trackingReady = true;
            sendQueuedEvents();
          } else {
            setTimeout(checkMatomoReady, 100);
          }
        }

        checkMatomoReady();

        // Emit generic action to Matomo
        window.emitMatomoAction = function (action, name, label) {
          var event = ["trackEvent", "Zdarzenia", action, name, label || 1];
          if (trackingReady && window._paq) {
            window._paq.push(event);
          } else {
            trackingQueue.push(event);
          }
        };

        window.ACTION_ENTER = function (label) {
          window.emitMatomoAction(
            "ACTION_ENTER",
            label || location.pathname || document.title,
            1,
          );
        };

        window.ACTION_CLICK = function (label) {
          window.emitMatomoAction("ACTION_CLICK", label || "", 1);
        };

        window.ACTION_FOCUS = function (label) {
          window.emitMatomoAction("ACTION_FOCUS", label || "", 1);
        };

        // Emit ACTION_ENTER once when the app is ready
        if (
          document.readyState === "complete" ||
          document.readyState === "interactive"
        ) {
          setTimeout(function () {
            window.ACTION_ENTER();
          }, 500);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(function () {
              window.ACTION_ENTER();
            }, 500);
          });
        }

        async function fetchProgrammingJoke() {
          var jokeTarget = document.getElementById("joke-text");
          var fallbackJokes = [
            "Dlaczego programista nie lubi natury? Bo ma za dużo bugów.",
            "Ilu programistów potrzeba, żeby wymienić żarówkę? Żadnego, to problem hardware'owy.",
            "Programista w sklepie: poproszę chleb. Jeśli są jajka, to osiem.",
            "Spotykają się dwa wątki. Jeden pyta: Hej, wszystko gra? Drugi: Nie wiem, cały czas czekam.",
            "Debugowanie to jak bycie detektywem w kryminale, który samemu się napisało.",
          ];
          if (!jokeTarget) {
            return;
          }

          jokeTarget.textContent = "Ładowanie żartu...";

          try {
            var response = await fetch(
              "https://v2.jokeapi.dev/joke/Programming?lang=pl&blacklistFlags=nsfw,religious,political,racist,sexist,explicit",
            );

            if (!response.ok) {
              throw new Error("API unavailable");
            }

            var payload = await response.json();

            if (payload && payload.type === "single" && payload.joke) {
              jokeTarget.textContent = payload.joke;
              return;
            }

            if (payload && payload.type === "twopart") {
              jokeTarget.textContent = payload.setup + " " + payload.delivery;
              return;
            }

            jokeTarget.textContent =
              fallbackJokes[Math.floor(Math.random() * fallbackJokes.length)];
          } catch {
            jokeTarget.textContent =
              fallbackJokes[Math.floor(Math.random() * fallbackJokes.length)];
          }
        }

        function attachJokeActions() {
          var button = document.getElementById("joke-refresh");
          if (!button) {
            return;
          }

          button.addEventListener("click", function () {
            globalThis.ACTION_CLICK("joke-refresh");
            fetchProgrammingJoke();
          });

          button.addEventListener("focus", function () {
            globalThis.ACTION_FOCUS("joke-refresh-focus");
          });
        }

        if (
          document.readyState === "complete" ||
          document.readyState === "interactive"
        ) {
          attachJokeActions();
          fetchProgrammingJoke();
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            attachJokeActions();
            fetchProgrammingJoke();
          });
        }
      })();
    </script>
  </head>
  <body>
    <main class="joke-widget" aria-live="polite">
      <p id="joke-text" class="joke-widget__text">
        Kliknij przycisk, aby pobrać żart.
      </p>
      <div class="joke-widget__actions">
        <button id="joke-refresh" class="joke-widget__button" type="button">
          Losuj kolejny żart
        </button>
      </div>
    </main>
    <!-- <app-root></app-root> -->
  </body>
</html>
